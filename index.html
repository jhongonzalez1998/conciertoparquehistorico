<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Cita Especial</title>
    <style>
        body {
            background-color: #4B2E83; /* Morado del flyer */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #FFD700; /* Dorado/Amarillo */
        }
        h1 { color: #FFD700; }
        .mesiversario { font-size: 1.2em; margin-bottom: 20px; }
        .flyer { width: 100%; border-radius: 10px; margin: 20px 0; }
        .boton {
            background-color: #FFD700;
            color: #4B2E83;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            display: inline-block;
            transition: transform 0.3s;
        }
        .boton:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <p class="mesiversario">❤️ ¡Feliz mesiversario, mi amor! ❤️</p>
        <h1>¿Me acompañas mañana?</h1>
        <p>Porque cada mes a tu lado es un motivo para celebrar, quiero que cantemos juntos estas canciones.</p>
        
        <img src="invitacion.jpg" alt="Ex & Next Live Sessions" class="flyer">

        <div style="margin-top: 20px;">
            <p><strong>Lugar:</strong> Parque Histórico - Estación Fluvial</p>
            <p><strong>Hora:</strong> 7:00 PM</p>
        </div>

        <a href="https://wa.me/593978941301?text=¡SÍ+ACEPTO+LA+CITA!+❤️" class="boton">¡SÍ, QUIERO IR!</a>
    </div>
    <audio id="musica" loop>
    <source src="amor del bueno.mp3" type="audio/mpeg">
    Tu navegador no soporta el elemento de audio.
</audio>

<script>
    // Esto hace que la música empiece al primer toque en la pantalla
    document.addEventListener('click', function() {
        var audio = document.getElementById('musica');
        audio.play();
    }, { once: true }); // Solo se ejecuta la primera vez que hace clic
</script>

<style>
    /* Un pequeño recordatorio visual */
    .nota-musical {
        font-size: 0.8em;
        color: #FFD700;
        margin-top: 10px;
        font-style: italic;
    }
</style>

<p class="nota-musical">🎵 Toca en cualquier lugar para escuchar la canción...</p>
</body>
</html>
